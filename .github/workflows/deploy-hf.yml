name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN}" ]; then
            echo "HF_TOKEN is not set"
            exit 1
          fi
          SPACE_DIR="$(mktemp -d)"

          # Build a clean deployment snapshot (no git history, no reference repo, no large media)
          rsync -a ./ "$SPACE_DIR/" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'learn' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '*.ipynb' \
            --exclude '*.mov' \
            --exclude '*.mp4'

          cd "$SPACE_DIR"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy to HF Space from ${GITHUB_SHA}"
          git remote add hf "https://tanmaydesai07:${HF_TOKEN}@huggingface.co/spaces/tanmaydesai07/openenv-dataclean-agent"
          git push hf HEAD:main --force
