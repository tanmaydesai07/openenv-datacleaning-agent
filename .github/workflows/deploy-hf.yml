name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN}" ]; then
            echo "HF_TOKEN is not set"
            exit 1
          fi
          git remote remove hf || true
          git remote add hf https://tanmaydesai07:${HF_TOKEN}@huggingface.co/spaces/tanmaydesai07/openenv-dataclean-agent
          git push hf main:main --force
